<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>細流 2026｜志工行程管理系統</title>
    <style>
        :root {
            --primary: #1a6e35;
            --bg: #FAF5EE;
            --card: #ffffff;
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .status-bar { font-size: 12px; text-align: right; margin-bottom: 10px; color: #666; }
        select, input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); }
        .time { font-weight: bold; color: var(--primary); font-size: 14px; }
        .event { font-size: 16px; margin: 5px 0; font-weight: 600; }
        .details { display: flex; gap: 10px; margin-top: 8px; font-size: 14px; }
        .task { background: #e2f0e8; padding: 4px 8px; border-radius: 4px; flex: 1; }
        .loc { background: #fff3e0; padding: 4px 8px; border-radius: 4px; flex: 1; }
        .loading { text-align: center; padding: 50px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>細流 2026 🎭</h1>
        </div>
        
        <div id="status" class="status-bar">正在載入資料...</div>

        <select id="userSelect" onchange="renderSchedule()">
            <option value="">請選擇您的姓名</option>
        </select>

        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="changeDay('Day1')" style="flex:1; padding: 10px;">Day 1</button>
            <button onclick="changeDay('Day2')" style="flex:1; padding: 10px;">Day 2</button>
            <button onclick="changeDay('Day3')" style="flex:1; padding: 10px;">Day 3</button>
        </div>

        <div id="loading" class="loading">同步試算表資料中...</div>
        <div id="scheduleBody"></div>
    </div>

    <script>
        // 這裡填入您的 GAS 部署網址
        const API_URL = 'https://script.google.com/macros/s/AKfycbzyrXeW7eNmZnvnRgc1kigQa5xpG5_OvSSFJ-l5QftnyjpcGAgO63CIzsVzA3P1OY9t/exec';
        
        let ALL_DATA = null;
        let currentDay = 'Day1';

        async function syncData() {
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch(API_URL);
                ALL_DATA = await response.json();
                localStorage.setItem('xiuData', JSON.stringify(ALL_DATA));
                updateUserList();
                renderSchedule();
                document.getElementById('status').innerText = '同步成功: ' + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('status').innerText = '同步失敗，使用快取資料';
                const cached = localStorage.getItem('xiuData');
                if(cached) {
                    ALL_DATA = JSON.parse(cached);
                    updateUserList();
                    renderSchedule();
                }
            }
            document.getElementById('loading').style.display = 'none';
        }

        function updateUserList() {
            const select = document.getElementById('userSelect');
            const currentVal = select.value;
            select.innerHTML = '<option value="">請選擇您的姓名</option>';
            if(ALL_DATA && ALL_DATA.people) {
                ALL_DATA.people.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.name;
                    opt.text = p.name;
                    select.appendChild(opt);
                });
            }
            select.value = currentVal;
        }

        function changeDay(day) {
            currentDay = day;
            renderSchedule();
        }

        function renderSchedule() {
            const name = document.getElementById('userSelect').value;
            const container = document.getElementById('scheduleBody');
            container.innerHTML = '';

            if(!name || !ALL_DATA) {
                container.innerHTML = '<p style="text-align:center; color:#999;">請先選擇姓名以查看行程</p>';
                return;
            }

            const personal = (ALL_DATA.personSchedule[name] || {})[currentDay] || [];
            
            if(personal.length === 0) {
                container.innerHTML = '<p style="text-align:center;">此日期無個人行程</p>';
                return;
            }

            personal.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="time">${item.time}</div>
                    <div class="event">${item.event}</div>
                    <div class="details">
                        <div class="task">📌 任務：${item.task || '無'}</div>
                        <div class="loc">📍 地點：${item.location || '無'}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 自動啟動
        window.onload = syncData;
    </script>
</body>
</html>
