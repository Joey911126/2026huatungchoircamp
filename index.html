// ════════════════════════════════════════════════
//  核心：從 personSchedule 聚合「行程總覽」
//  同一天、同一活動（time+event），收集所有人的地點
// ════════════════════════════════════════════════
/**
 * 從 PERSON_SCHEDULE[dayId] 聚合出行程總覽列表。
 * 每個 entry = {time, event, task, transit, locs:[...不重複地點]}
 * locs 為所有人在此活動填寫的不重複地點陣列。
 */
function getAggregatedSchedule(dayId) {
  const psDay = PERSON_SCHEDULE[dayId] || {};
  // key = time + '||' + event
  const map = new Map();

  Object.values(psDay).forEach(items => {
    (items || []).forEach(s => {
      const key = (s.time || '') + '||' + (s.event || '');
      if (!map.has(key)) {
        map.set(key, {
          time: s.time || '',
          event: s.event || '',
          task: s.task || '',
          transit: s.transit || false,
          locs: new Set()
        });
      }
      const entry = map.get(key);
      if (s.loc && s.loc.trim()) entry.locs.add(s.loc.trim());
      // 若某人的 task 有值但 entry 還是空，補入
      if (!entry.task && s.task) entry.task = s.task;
    });
  });

  // 轉換 Set → Array，依時間排序
  const result = [...map.values()]
    .map(e => ({ ...e, locs: [...e.locs] }))
    .sort((a, b) => {
      const ta = (a.time || '99:99').split('-')[0];
      const tb = (b.time || '99:99').split('-')[0];
      return ta.localeCompare(tb);
    });

  // ── 固定場地覆寫（行程總覽專用，不影響個人行程）──
  // 規則1：時間含 08:20 的換場 → 風雨球場
  // 規則2：早操（event 含「早操」）→ 風雨球場
  // 規則3：時間含 20:30 的換場 → 各寢室
  // 規則4：Buddy Time（event 含「Buddy」或「buddy」）→ 各寢室
  // 規則5：今晚活動（19:xx）→ 地點取活動組成員的 loc，若無則保留聚合結果
  const KENTEN_NOS = new Set(
    PEOPLE.filter(p => p.group === '活動組').map(p => String(p.no))
  );

  result.forEach(entry => {
    const startTime = (entry.time || '').split('-')[0].trim(); // e.g. "08:20"
    const ev        = entry.event || '';

    // 規則1：08:20 換場
    if (startTime === '08:20' && (entry.transit || ev.includes('換場'))) {
      entry.locs = ['風雨球場']; return;
    }
    // 規則2：早操
    if (ev.includes('早操')) {
      entry.locs = ['風雨球場']; return;
    }
    // 規則3：20:30 換場
    if (startTime === '20:30' && (entry.transit || ev.includes('換場'))) {
      entry.locs = ['各寢室']; return;
    }
    // 規則4：Buddy Time
    if (ev.toLowerCase().includes('buddy')) {
      entry.locs = ['各寢室']; return;
    }
    // 規則5：今晚活動（19:xx）→ 以活動組的 loc 為主
    if (startTime && parseInt(startTime) === 19) {
      const psDay = PERSON_SCHEDULE[dayId] || {};
      const eveningLocs = new Set();
      Object.entries(psDay).forEach(([no, items]) => {
        if (!KENTEN_NOS.has(no)) return;
        (items || []).forEach(s => {
          const st = (s.time || '').split('-')[0].trim();
          if (parseInt(st) === 19 && s.loc && s.loc.trim()
              && (s.event || '') === ev) {
            eveningLocs.add(s.loc.trim());
          }
        });
      });
      if (eveningLocs.size > 0) entry.locs = [...eveningLocs];
      // 若活動組沒有地點資料，保留原聚合結果
    }
  });

  return result;
}

/**
 * 從聚合列表取得所有不重複地點
 */
function getAllLocsForDay(dayId) {
  const items = getAggregatedSchedule(dayId);
  const set = new Set();
  items.forEach(s => s.locs.forEach(l => set.add(l)));
  return [...set];
}

/**
 * 個人行程：直接取 PERSON_SCHEDULE[dayId][personNo]
 */
function getPersonItems(dayId, personNo) {
  const psDay = PERSON_SCHEDULE[dayId] || {};
  return (psDay[String(personNo)] || []).slice().sort((a, b) => {
    const ta = (a.time || '99:99').split('-')[0];
    const tb = (b.time || '99:99').split('-')[0];
    return ta.localeCompare(tb);
  });
}

    $('sb-locs').innerHTML    = '<span style="color:var(--text3)">—</span>';
    return;
  }

  let items = getAggregatedSchedule(currentDay);
  if(searchQ) items = items.filter(i =>
    ((i.event||'') + (i.task||'') + (i.locs||[]).join(' ')).toLowerCase().includes(searchQ)
  );

  const periods = [
    {label:'🌅 早上 MORNING',   test:t=>{ const h=parseInt(t); return h>=6&&h<12; }},
    {label:'☀️ 中午 NOON',      test:t=>{ const h=parseInt(t); return h>=12&&h<14; }},
    {label:'🌤 下午 AFTERNOON',  test:t=>{ const h=parseInt(t); return h>=14&&h<18; }},
    {label:'🌙 晚間 EVENING',    test:t=>{ const h=parseInt(t); return h>=18||t==='全天'||h<=2; }},
  ];

  let html = '', hasAny = false;
  periods.forEach(period => {
    const pf = items.filter(s => {
      if (!s.time) return false;
      const t = s.time.split('-')[0];
      if (period.label.includes('晚') && s.time === '全天') return true;
      return period.test(t);
    });
    if (!pf.length) return;
    hasAny = true;
    html += `<div class="tl-period"><div class="tl-period-head">${period.label}</div><div class="tl-list">`;
    html += pf.map(s => {
      const evName    = s.event || '';
      const isTransit = s.transit === true || evName === '換場';
      const icon      = getIcon(evName);
      const badge     = isTransit ? '<span class="tl-badge badge-transit">移動</span>' : '';
      const evDisplay = evName || '<span style="color:var(--text3);font-style:italic;font-weight:400">（未填寫）</span>';

      // ── 地點 pills（可能多個）──

            return `${sep}<button class="loc-pill${multi?' multi-badge':''}" onclick="openLocModal('${le}')">📍 ${l}</button>`;

          `</div>`;

        <div class="tl-content">
          <div class="tl-ev-name">${evDisplay} ${badge}</div>

      </div>`;
    }).join('');

    return `<button onclick="openLocModal('${le}')" style="display:inline-flex;align-items:center;gap:3px;padding:1px 8px;border-radius:10px;background:var(--emerald-light);border:1px solid rgba(26,110,53,0.18);margin:2px;font-size:.7rem;color:var(--emerald);cursor:pointer;font-family:inherit">📍 ${l}</button>`;
  }).join('') || '<span style="color:var(--text3)">—</span>';
}

// ════════════════════════════════════════════════
//  個人行程
// ════════════════════════════════════════════════
function toggleMyGroup(g){ myFilterGroup = myFilterGroup===g ? null : g; buildGroupChips('myGroupChips', myFilterGroup, 'toggleMyGroup'); renderPersonGrid(); }

function renderPersonGrid(){
  if(!hasData()){
    $('personGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:1.5rem;color:var(--text3);font-size:.82rem">請先同步取得志工名單</div>`;
    return;
  }
  const q  = ($('mySearch')||{value:''}).value.trim().toLowerCase();
  let pp = PEOPLE.filter(p => {
    const matchG = !myFilterGroup || p.group === myFilterGroup;
    const matchQ = !q || p.name.toLowerCase().includes(q) || String(p.no).includes(q);
    return matchG && matchQ;
  });
  const byGroup = {};
  pp.forEach(p => { if(!byGroup[p.group]) byGroup[p.group]=[]; byGroup[p.group].push(p); });

  // ── 營長固定顯示：確保秋秋、里歐的板塊永遠存在 ──
  const FIXED_LEADERS = [
    {no:68, name:'秋秋', group:'營長', slack:''},
    {no:69, name:'里歐', group:'營長', slack:''},
  ];
  FIXED_LEADERS.forEach(fl => {
    const matchG = !myFilterGroup || myFilterGroup === '營長';
    const matchQ = !q || fl.name.toLowerCase().includes(q) || String(fl.no).includes(q);
    if (!matchG || !matchQ) return;
    if (!byGroup['營長']) byGroup['營長'] = [];
    // 若 PEOPLE 已有（GAS 有回傳），不重複加入
    if (!byGroup['營長'].some(p => p.no === fl.no)) {
      byGroup['營長'].push(fl);
    }
  });
  $('personGrid').innerHTML = Object.entries(byGroup).map(([g, members]) => {
    const cfg = GROUPS[g]||{color:'#888',bg:'#eee',mid:'#ccc'};
    return members.map(p => {
      const sel = selectedPerson?.no === p.no;
      return `<div class="pc${sel?' sel':''}" onclick="selectPerson(${p.no})">
        <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${cfg.mid}"></div>
        <div class="pc-name">${p.name}</div>
        <div class="pc-no">#${p.no} · ${g}</div>
      </div>`;
    }).join('');
  }).join('');
  renderMySchedule();
}

function selectPerson(no){
  const FIXED_LEADERS = [
    {no:68, name:'秋秋', group:'營長', slack:''},
    {no:69, name:'里歐', group:'營長', slack:''},
  ];
  const found = PEOPLE.find(p => p.no === no) || FIXED_LEADERS.find(p => p.no === no);
  selectedPerson = selectedPerson?.no === no ? null : found;
  renderPersonGrid();
}

function renderMySchedule(){
  const el = $('myScheduleEl');
  if(!selectedPerson){ el.innerHTML = ''; return; }
  const p   = selectedPerson;
  if(p.group === '營長'){
    const cfg = GROUPS['營長']||{color:'#888',bg:'#eee',mid:'#ccc'};
    const day = DAYS.find(d => d.id === currentDay);
    el.innerHTML = `<div class="my-schedule-card">
      <div class="my-header">
        <div class="my-avatar" style="background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.mid}44">${p.name[0]}</div>
        <div>
          <div class="my-name">${p.name}</div>
          <div class="my-sub">${p.group} · #${p.no} · ${day.full}</div>
        </div>
        <span style="margin-left:auto;font-size:.72rem;padding:.25rem .65rem;border-radius:12px;background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.mid}44">${p.group}</span>
      </div>
      <div style="text-align:center;padding:1.5rem;color:var(--text3);font-size:.82rem">不顯示行程</div>
    </div>`;
    return;
  }
  const cfg = GROUPS[p.group]||{color:'#888',bg:'#eee',mid:'#ccc'};
  const day = DAYS.find(d => d.id === currentDay);
  const myItems = getPersonItems(currentDay, p.no);

  el.innerHTML = `<div class="my-schedule-card">
    <div class="my-header">
      <div class="my-avatar" style="background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.mid}44">${p.name[0]}</div>
      <div>
        <div class="my-name">${p.name}</div>
        <div class="my-sub">${p.group} · #${p.no} · ${day.full}</div>
      </div>
      <span style="margin-left:auto;font-size:.72rem;padding:.25rem .65rem;border-radius:12px;background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.mid}44">${p.group}</span>
    </div>
    ${myItems.length
      ? `<div class="my-rows">${myItems.map(s => {
          const locEsc    = escLoc(s.loc);
          const isTransit = s.transit === true || s.event === '換場';
          return `<div class="tl-row${isTransit?' transit':''}" style="margin-bottom:0">
            <div class="tl-time">${s.time||'—'}</div>
            <div class="tl-icon-cell" style="${isTransit?'background:#f0f0f0;border-color:#ddd;font-size:.7rem':''}">${getIcon(s.event||'')}</div>
            <div class="tl-content">
              <div class="tl-ev-name">${s.event||'<span style="color:var(--text3);font-style:italic">（未填寫活動名稱）</span>'}</div>
              ${s.task  ? `<div class="tl-task-txt">${s.task}</div>`                                         : '<div class="tl-task-txt" style="color:var(--text3)">（未填寫行程）</div>'}
              ${s.note  ? `<div class="tl-task-txt" style="color:var(--violet-mid)">📝 ${s.note}</div>`     : ''}
              ${s.loc   ? `<button class="tl-loc-btn" onclick="openLocModal('${locEsc}')">📍 ${s.loc}</button>` : '<div class="tl-task-txt" style="color:var(--text3)">（未填寫地點）</div>'}
            </div>
          </div>`;
        }).join('')}</div>`
      : '<div style="text-align:center;padding:1.5rem;color:var(--text3);font-size:.82rem">尚未填寫行程</div>'}
  </div>`;
}

// ════════════════════════════════════════════════
//  場地 Tab
// ════════════════════════════════════════════════
function renderLocGrid(){
  if(!hasData()){
    $('locGrid').innerHTML = `<div class="sync-hint" style="grid-column:1/-1"><span class="sync-hint-icon">☁️</span>尚未取得場地資料<br>請先同步</div>`;
    return;
  }
  const items = getAggregatedSchedule(currentDay).filter(s => s.locs && s.locs.length && !s.transit);
  // 依地點分組
  const byLoc = {};
  items.forEach(s => {
    s.locs.forEach(loc => {
      if(!byLoc[loc]) byLoc[loc] = [];
      byLoc[loc].push(s);
    });
  });
  $('locGrid').innerHTML = Object.entries(byLoc).map(([loc, si]) => {
    const le = escLoc(loc);
    return `<div class="loc-card">
      <div class="loc-name" onclick="openLocModal('${le}')">📍 ${loc}</div>
      ${si.map(s => `<div class="loc-item">
        <div class="loc-t">${s.time}</div>
        <div style="flex:1">
          <div class="loc-ev">${s.event}</div>
          ${s.task ? `<div class="loc-task">${s.task}</div>` : ''}
        </div>
      </div>`).join('')}
    </div>`;
  }).join('') || '<div class="empty-state">當日無場地資料</div>';
}

// ════════════════════════════════════════════════
//  Modals
// ════════════════════════════════════════════════
function openLocModal(loc){
  $('modalLocName').textContent = loc;
  // 找出此地點對應的所有活動（從聚合資料中 locs 包含此地點的）
  const items = getAggregatedSchedule(currentDay).filter(s => s.locs && s.locs.includes(loc));
  $('modalLocBody').innerHTML = items.map(s =>
    `<div style="padding:.45rem .6rem;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;display:flex;gap:.6rem;align-items:flex-start;font-size:.8rem">
      <span style="font-family:'JetBrains Mono',monospace;color:var(--emerald);font-size:.68rem;min-width:88px;flex-shrink:0">${s.time}</span>
      <span>${s.event}${s.task?'<br><span style="font-size:.7rem;color:var(--text3)">'+s.task+'</span>':''}</span>
    </div>`
  ).join('') || '<div style="color:var(--text3);font-size:.8rem">無資料</div>';
  $('locModal').classList.add('open');
}
function closeModal(){ $('locModal').classList.remove('open'); }

function openMapModal(locName){
  const label = $('mapModalLocLabel');
  if(label) label.textContent = locName ? '· ' + locName : '';
  const MAP_1F = ['7A','7B','學務處','多功能教室1'];
  const MAP_2F = ['9A','9B','10A','10B','12A','12B'];
  const MAP_3F = ['11A','11B'];
  let mapSrc = '平面圖.png';
  if(locName){
    if(MAP_1F.some(k => locName.includes(k)))      mapSrc = '1F.jpg';
    else if(MAP_2F.some(k => locName.includes(k))) mapSrc = '2F.jpg';
    else if(MAP_3F.some(k => locName.includes(k))) mapSrc = '3F.jpg';
  }
  const img = $('mapImg'), fallback = $('mapImgFallback');
  if(img){ img.src = mapSrc; img.style.display = ''; if(fallback) fallback.style.display = 'none'; }
  $('mapModal').classList.add('open');
  $('locModal').classList.remove('open');
}
function closeMapModal(){ $('mapModal').classList.remove('open'); }

function closePersonModal(){ $('personModal').classList.remove('open'); }

// ════════════════════════════════════════════════
//  FAB
// ════════════════════════════════════════════════
function showFabTip(){ const t=$('fabTip'); if(t) t.style.opacity='1'; }
function hideFabTip(){ const t=$('fabTip'); if(t) t.style.opacity='0'; }

function jumpToNow(){
  const now = new Date();
  const tpe = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
  const hhmm = String(tpe.getHours()).padStart(2,'0')+':'+String(tpe.getMinutes()).padStart(2,'0');
  const hhmm_mins = parseInt(hhmm.split(':')[0])*60 + parseInt(hhmm.split(':')[1]);

  const tpeDateStr = `${tpe.getFullYear()}/${tpe.getMonth()+1}/${tpe.getDate()}`;
  const todayDay = DAYS.find(d => { const m=d.full.match(/^(\d{4}\/\d+\/\d+)/); return m&&m[1]===tpeDateStr; });
  let dayChanged = false;
  if(todayDay && todayDay.id !== currentDay){
    currentDay = todayDay.id;
    dayChanged = true;
    buildDayStrip(); renderSchedule(); renderLocGrid();
    if(currentTab==='my') renderMySchedule();
  }

  function highlightRow(el){
    el.scrollIntoView({behavior:'smooth',block:'center'});
    el.style.transition='box-shadow .2s,border-left-color .2s';
    el.style.boxShadow='0 0 0 3px rgba(192,69,106,0.35),0 4px 20px rgba(192,69,106,0.2)';
    el.style.borderLeftColor='var(--rose)';
    setTimeout(()=>{ el.style.boxShadow=''; el.style.borderLeftColor=''; },1800);
  }
  function findBestRow(selector, timeSelector){
    const rows = document.querySelectorAll(selector);
    let bestEl=null, bestDiff=Infinity;
    rows.forEach(el=>{
      const timeEl=el.querySelector(timeSelector); if(!timeEl) return;
      const t=timeEl.textContent.trim().split('-')[0].trim();
      if(!/^\d{2}:\d{2}/.test(t)) return;
      const diff=Math.abs(hhmm_mins-(parseInt(t.split(':')[0])*60+parseInt(t.split(':')[1])));
      if(diff<bestDiff){bestDiff=diff;bestEl=el;}
    });
    return bestEl;
  }

  if(currentTab==='my'){
    if(!selectedPerson){showToast('🔮 請先選擇一位志工');return;}
    const doScroll=()=>{
      const bestEl=findBestRow('#myScheduleEl .tl-row','.tl-time');
      if(bestEl){highlightRow(bestEl);showToast('🔮 台北時間 '+hhmm+(todayDay?'':' · 非營期'));}
      else{window.scrollTo({top:0,behavior:'smooth'});showToast('🔮 現在是 '+hhmm+'，無行程');}
    };
    if(dayChanged) requestAnimationFrame(doScroll); else doScroll();
    return;
  }
  if(currentTab!=='schedule') switchTab('schedule');
  const doScrollSchedule=()=>{
    const bestEl=findBestRow('#timelineEl .tl-row','.tl-time');
    if(bestEl){highlightRow(bestEl);showToast('🔮 台北時間 '+hhmm+(todayDay?'':' · 非營期'));}
    else{window.scrollTo({top:0,behavior:'smooth'});showToast('🔮 現在是 '+hhmm+'，非行程時段');}
  };
  if(dayChanged) requestAnimationFrame(doScrollSchedule); else doScrollSchedule();
}

// ════════════════════════════════════════════════
//  GAS 同步
// ════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycby3uztOmRwAwc7dBUZt5p8nL2uiGq2Pra5vG_uJ7Kok08q7ktcq9715oHWyZc47CdFR/exec';

function setSyncState(state, msg){
  const pill=$('syncPill'), spinner=$('syncDot'), simple=$('syncDotSimple'), lbl=$('syncLabel');
  pill.className = 'sync-pill' + ({syncing:' syncing',ok:' ok',err:' err'}[state]||'');

  // 清理舊魔法粒子
  const old = pill.querySelector('.sync-magic-wrap');
  if(old) old.remove();

  if(state === 'syncing'){
    simple.style.display = 'none';
    // 魔法粒子環繞，取代進度條——4顆以不同速度、起始角度公轉
    const wrap = document.createElement('div');
    wrap.className = 'sync-magic-wrap';
    const sparks = [
      {emoji:'✦', dur:2.0, angle:0,   color:'rgba(122,53,190,0.75)'},
      {emoji:'·', dur:1.6, angle:90,  color:'rgba(200,134,10,0.80)'},
      {emoji:'✦', dur:2.4, angle:180, color:'rgba(122,53,190,0.60)'},
      {emoji:'·', dur:1.9, angle:270, color:'rgba(200,134,10,0.65)'},
    ];
    sparks.forEach(s => {
      const el = document.createElement('span');
      el.className = 'sync-spark';
      el.textContent = s.emoji;
      el.style.cssText = `--start-angle:${s.angle}deg;animation-duration:${s.dur}s;color:${s.color};transform:rotate(${s.angle}deg) translateX(15px) rotate(-${s.angle}deg)`;
      wrap.appendChild(el);
    });
    pill.appendChild(wrap);
  } else {
    simple.style.display = '';
    simple.textContent = {ok:'●',err:'✕',idle:'○'}[state]||'○';
  }
  lbl.innerHTML = `<span class="sync-label-inner">${msg||'同步'}</span>`;
}

function applyData(data){
  if(data.people && data.people.length)          PEOPLE          = data.people;
  if(data.personSchedule)                        PERSON_SCHEDULE = data.personSchedule;
  // schedule 欄位：若 GAS 有回傳則存下（供 fallback 或備用），但渲染優先用 personSchedule
  if(data.schedule && Object.keys(data.schedule).length) SCHEDULE = data.schedule;

  localStorage.setItem('xiuData', JSON.stringify({people:PEOPLE, schedule:SCHEDULE, personSchedule:PERSON_SCHEDULE}));
  localStorage.setItem('xiuAt', String(Date.now()));

  setSyncState('ok','已同步 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
  buildGroupChips('myGroupChips', myFilterGroup, 'toggleMyGroup');
  renderSchedule(); renderPersonGrid(); renderLocGrid();
  showToast('✅ 行程同步成功！');
}

function loadCached(){
  try{
    const saved = localStorage.getItem('xiuData');
    if(saved){
      const d = JSON.parse(saved);
      if(d.people)          PEOPLE          = d.people;
      if(d.personSchedule)  PERSON_SCHEDULE = d.personSchedule;
      if(d.schedule)        SCHEDULE        = d.schedule;
      const at = localStorage.getItem('xiuAt');
      if(at){
        const ago    = Math.round((Date.now()-parseInt(at))/60000);
        const agoStr = ago < 60 ? `${ago} 分鐘前` : `${Math.round(ago/60)} 小時前`;
        setSyncState('ok','上次同步：'+agoStr);
        buildGroupChips('myGroupChips', myFilterGroup, 'toggleMyGroup');
        renderSchedule(); renderPersonGrid(); renderLocGrid();
      }
    }
    const at  = localStorage.getItem('xiuAt');
    const age = at ? (Date.now()-parseInt(at))/60000 : 9999;
    if(age >= 15) syncNow();
    setInterval(syncNow, 15*60*1000);
  }catch(e){ console.warn('loadCached error', e); }
}

function syncNow(){
  if(!GAS_URL){ showToast('⚠️ GAS 網址未設定'); return; }
  setSyncState('syncing','同步中…');
  const tryFetch = () =>
    fetch(GAS_URL, {redirect:'follow'})
      .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(data => applyData(data))
      .catch(() => tryJsonp());

  const tryJsonp = () => {
    const cb     = '_xiu_cb_'+Date.now();
    const script = document.createElement('script');
    const timer  = setTimeout(()=>{
      cleanup(); setSyncState('err','同步逾時');
      showToast('❌ 同步逾時，請確認部署設定', 4000);
    }, 15000);
    function cleanup(){ window[cb]=null; if(script.parentNode) script.parentNode.removeChild(script); clearTimeout(timer); }
    window[cb] = data => { cleanup(); try{ applyData(data); }catch(e){ setSyncState('err','同步失敗'); } };
    script.onerror = ()=>{ cleanup(); setSyncState('err','同步失敗'); showToast('❌ 網址錯誤或未部署', 3500); };
    script.src = GAS_URL + '?callback=' + cb + '&t=' + Date.now();
    document.head.appendChild(script);
  };
  tryFetch();
}

// ════════════════════════════════════════════════
//  初始化
// ════════════════════════════════════════════════
buildDayStrip();
buildGroupChips('myGroupChips', null, 'toggleMyGroup');
renderSchedule();
renderPersonGrid();
renderLocGrid();
loadCached();
</script>
